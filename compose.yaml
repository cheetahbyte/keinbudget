services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-keinbudget}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keinbudget}
      POSTGRES_DB: ${POSTGRES_DB:-keinbudget}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-keinbudget} -d
            ${POSTGRES_DB:-keinbudget}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
        VITE_AUTH_URL: ${VITE_AUTH_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-keinbudget}:${POSTGRES_PASSWORD:-keinbudget}@postgres:5432/${POSTGRES_DB:-keinbudget}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dev-only-change-me}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

volumes:
  postgres_data:
