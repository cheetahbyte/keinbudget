services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-keinbudget}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keinbudget}
      POSTGRES_DB: ${POSTGRES_DB:-keinbudget}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keinbudget} -d ${POSTGRES_DB:-keinbudget}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: sh -c "cd /app/packages/db && bunx drizzle-kit push"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-keinbudget}:${POSTGRES_PASSWORD:-keinbudget}@postgres:5432/${POSTGRES_DB:-keinbudget}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-keinbudget}:${POSTGRES_PASSWORD:-keinbudget}@postgres:5432/${POSTGRES_DB:-keinbudget}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
    depends_on:
      migrate:
        condition: service_completed_successfully
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      API_URL: http://api:4000
      NODE_ENV: production
    depends_on:
      - api
    read_only: true
    tmpfs:
      - /tmp
      - /app/apps/web/.next/cache
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped

volumes:
  postgres_data:
